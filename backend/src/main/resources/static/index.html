<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management API</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 2rem; line-height: 1.4; }
      code { background: #f3f4f6; padding: 0.15rem 0.35rem; border-radius: 6px; }
      .box { border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; max-width: 860px; }
      a { color: #2563eb; }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Employee Management Backend</h2>
      <p>REST endpoints:</p>
      <ul>
        <li><code>POST /employees</code></li>
        <li><code>GET /employees</code></li>
        <li><code>GET /employees/{id}</code></li>
        <li><code>PUT /employees/{id}</code></li>
        <li><code>DELETE /employees/{id}</code></li>
      </ul>
      <p>H2 Console: <a href="/h2-console">/h2-console</a></p>
    </div>
  </body>
</html>
