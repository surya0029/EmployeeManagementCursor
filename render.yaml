services:
  - type: web
    name: employee-management-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: employee-management-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
